<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Söz Hakkı</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --text:#101828;
      --muted:#667085;
      --line:#e4eaf2;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --soft:#eef4ff;
      --success:#16a34a;
      --danger:#dc2626;
      --danger-soft:#fff1f2;
      --warning:#f59e0b;
      --warning-soft:#fff7ed;
      --shadow:0 16px 42px rgba(15,23,42,.09);
      --radius:22px;
    }

    *{
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      min-height:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      min-height:100dvh;
      background:
        radial-gradient(circle at top left, rgba(37,99,235,.13), transparent 32%),
        radial-gradient(circle at bottom right, rgba(22,163,74,.08), transparent 34%),
        linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
      color:var(--text);
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }

    button,input,select{
      font:inherit;
    }

    .app{
      width:100%;
      max-width:470px;
      min-height:100dvh;
      margin:0 auto;
      padding:12px 11px calc(20px + env(safe-area-inset-bottom));
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .logo{
      width:42px;
      height:42px;
      border-radius:16px;
      background:linear-gradient(145deg,#2563eb,#60a5fa);
      color:white;
      display:grid;
      place-items:center;
      font-weight:1000;
      box-shadow:0 10px 22px rgba(37,99,235,.27);
      flex:0 0 auto;
    }

    .brand h1{
      margin:0;
      font-size:1.1rem;
      font-weight:1000;
      letter-spacing:-.03em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .sync-pill{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:58px;
      height:26px;
      padding:0 10px;
      border-radius:999px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:.72rem;
      font-weight:800;
      box-shadow:0 8px 18px rgba(15,23,42,.05);
    }

    .icon-btn{
      width:42px;
      height:42px;
      border:1px solid var(--line);
      background:#fff;
      border-radius:15px;
      display:grid;
      place-items:center;
      color:var(--text);
      box-shadow:0 9px 20px rgba(15,23,42,.06);
      transition:.14s ease;
      user-select:none;
    }

    .icon-btn:hover{
      background:#f8fafc;
      transform:translateY(-1px);
    }

    .icon-btn:active{
      transform:scale(.96);
    }

    .panel{
      background:rgba(255,255,255,.94);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:15px;
      backdrop-filter:blur(12px);
    }

    .screen{
      display:none;
    }

    .screen.active{
      display:block;
    }

    .title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .step-title{
      margin:0;
      font-size:1.02rem;
      font-weight:1000;
      letter-spacing:-.02em;
    }

    .class-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .choice-card{
      width:100%;
      min-height:74px;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:14px 11px;
      text-align:left;
      transition:.15s ease;
      user-select:none;
    }

    .choice-card:hover{
      border-color:#bfd3ff;
      background:#f8fbff;
      transform:translateY(-1px);
      box-shadow:0 9px 20px rgba(37,99,235,.08);
    }

    .choice-card:active{
      transform:scale(.975);
    }

    .choice-card strong{
      display:block;
      font-size:1.14rem;
      font-weight:1000;
      line-height:1;
    }

    .choice-card span{
      display:block;
      color:var(--muted);
      font-size:.76rem;
      font-weight:800;
      margin-top:7px;
    }

    .sort-list{
      display:grid;
      gap:9px;
    }

    .sort-btn{
      width:100%;
      border:1px solid var(--line);
      border-radius:17px;
      background:#fff;
      padding:13px 14px;
      display:flex;
      align-items:center;
      gap:12px;
      text-align:left;
      transition:.15s ease;
      user-select:none;
    }

    .sort-btn:hover{
      background:#f8fbff;
      border-color:#bfd3ff;
      transform:translateY(-1px);
    }

    .sort-btn:active{
      transform:scale(.975);
    }

    .sort-num{
      width:34px;
      height:34px;
      border-radius:13px;
      background:var(--soft);
      color:var(--primary);
      display:grid;
      place-items:center;
      font-weight:1000;
      flex:0 0 auto;
    }

    .sort-btn strong{
      font-size:.96rem;
      font-weight:950;
      display:block;
    }

    .run-panel{
      min-height:calc(100dvh - 78px);
      display:flex;
      flex-direction:column;
      gap:11px;
    }

    .status-row{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
    }

    .stat{
      background:#fff;
      border:1px solid var(--line);
      border-radius:17px;
      padding:10px 7px;
      text-align:center;
      box-shadow:0 8px 18px rgba(15,23,42,.045);
      min-width:0;
    }

    .stat b{
      display:block;
      font-size:1.03rem;
      line-height:1.05;
      font-weight:1000;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .stat span{
      display:block;
      margin-top:4px;
      font-size:.7rem;
      color:var(--muted);
      font-weight:850;
    }

    .student-card{
      flex:1;
      min-height:330px;
      background:linear-gradient(180deg,#fff 0%,#f9fbff 100%);
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:18px 13px;
      text-align:center;
      position:relative;
      overflow:hidden;
      cursor:pointer;
      user-select:none;
      transition:.13s ease;
    }

    .student-card:active{
      transform:scale(.985);
      box-shadow:0 10px 24px rgba(15,23,42,.09);
    }

    .student-card::before{
      content:"";
      position:absolute;
      width:210px;
      height:210px;
      border-radius:999px;
      background:rgba(37,99,235,.08);
      right:-90px;
      top:-80px;
    }

    .student-card::after{
      content:"";
      position:absolute;
      width:170px;
      height:170px;
      border-radius:999px;
      background:rgba(22,163,74,.07);
      left:-80px;
      bottom:-80px;
    }

    .student-no{
      position:relative;
      z-index:2;
      color:var(--primary);
      background:var(--soft);
      border:1px solid #dbe8ff;
      border-radius:999px;
      padding:6px 12px;
      font-size:.82rem;
      font-weight:1000;
      margin-bottom:12px;
    }

    .student-name{
      position:relative;
      z-index:2;
      width:100%;
      font-weight:1000;
      letter-spacing:-.052em;
      line-height:1.02;
      font-size:clamp(2.45rem,11.2vw,4.45rem);
      overflow-wrap:anywhere;
    }

    .student-meta{
      position:relative;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-wrap:wrap;
      gap:7px;
      margin-top:15px;
    }

    .meta-badge{
      border-radius:999px;
      padding:7px 11px;
      font-size:.78rem;
      font-weight:1000;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
    }

    .meta-badge.primary{
      background:var(--soft);
      color:var(--primary);
      border-color:#dbe8ff;
    }

    .meta-badge.warn{
      background:var(--warning-soft);
      color:#9a3412;
      border-color:#fed7aa;
    }

    .action-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .main-btn{
      border:0;
      border-radius:19px;
      min-height:59px;
      font-weight:1000;
      font-size:1.02rem;
      transition:.14s ease;
      box-shadow:0 9px 20px rgba(15,23,42,.075);
      user-select:none;
    }

    .main-btn:hover{
      transform:translateY(-1px);
    }

    .main-btn:active{
      transform:scale(.975);
    }

    .btn-finish{
      color:#fff;
      background:linear-gradient(145deg,var(--primary),var(--primary-dark));
    }

    .btn-absent{
      color:#7c2d12;
      background:#fff7ed;
      border:1px solid #fed7aa;
    }

    .loading{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:var(--muted);
      font-size:.9rem;
      font-weight:850;
      padding:20px 0;
    }

    .modal-content{
      border-radius:25px;
      border:1px solid var(--line);
      overflow:hidden;
      box-shadow:0 24px 70px rgba(15,23,42,.22);
    }

    .modal-header,
    .modal-footer{
      border-color:var(--line);
    }

    .modal-title{
      font-weight:1000;
      letter-spacing:-.025em;
    }

    .btn-ui{
      border-radius:16px;
      font-weight:950;
      min-height:43px;
    }

    .score-table{
      font-size:.88rem;
      margin:0;
    }

    .score-table th{
      color:var(--muted);
      font-size:.72rem;
      text-transform:uppercase;
      letter-spacing:.045em;
      font-weight:1000;
      white-space:nowrap;
    }

    .score-table td{
      vertical-align:middle;
      font-weight:850;
    }

    .table-name{
      min-width:145px;
    }

    .badge-score{
      background:var(--soft);
      color:var(--primary);
      border:1px solid #dbe8ff;
    }

    .badge-red{
      background:#fee2e2;
      color:#b91c1c;
      border:1px solid #fecaca;
    }

    .badge-orange{
      background:#ffedd5;
      color:#9a3412;
      border:1px solid #fed7aa;
    }

    .settings-btn{
      width:100%;
      border-radius:17px;
      padding:13px 14px;
      border:1px solid var(--line);
      background:#fff;
      font-weight:950;
      text-align:left;
      transition:.14s ease;
    }

    .settings-btn:hover{
      background:#f8fafc;
      transform:translateY(-1px);
    }

    .settings-btn:active{
      transform:scale(.98);
    }

    .danger-zone{
      border-color:#fecaca;
      background:#fff7f7;
      color:#991b1b;
    }

    .alert-pro{
      display:flex;
      gap:12px;
      align-items:flex-start;
      border-radius:18px;
      padding:13px 14px;
      border:1px solid var(--line);
      background:#fff;
      box-shadow:0 14px 36px rgba(15,23,42,.12);
      min-width:min(360px,calc(100vw - 24px));
    }

    .alert-pro-icon{
      width:36px;
      height:36px;
      border-radius:14px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      font-size:1.1rem;
      font-weight:1000;
    }

    .alert-pro.success .alert-pro-icon{
      background:#dcfce7;
      color:#15803d;
    }

    .alert-pro.danger .alert-pro-icon{
      background:#fee2e2;
      color:#b91c1c;
    }

    .alert-pro.warning .alert-pro-icon{
      background:#ffedd5;
      color:#9a3412;
    }

    .alert-pro.info .alert-pro-icon{
      background:var(--soft);
      color:var(--primary);
    }

    .alert-pro-title{
      margin:0;
      font-size:.92rem;
      font-weight:1000;
      line-height:1.18;
    }

    .alert-pro-text{
      margin:3px 0 0;
      color:var(--muted);
      font-size:.8rem;
      font-weight:750;
    }

    .warning-strip{
      border:1px solid #fed7aa;
      background:#fff7ed;
      color:#9a3412;
      border-radius:17px;
      padding:10px 12px;
      font-size:.84rem;
      font-weight:1000;
      margin-bottom:10px;
      display:none;
    }

    .warning-strip.show{
      display:block;
    }

    .confirm-box{
      border-radius:20px;
      border:1px solid #fecaca;
      background:linear-gradient(180deg,#fff7f7,#fff);
      padding:14px;
    }

    .confirm-word{
      font-weight:1000;
      color:#b91c1c;
      letter-spacing:.08em;
    }

    @media (min-width:768px){
      .app{
        max-width:520px;
        padding-top:22px;
      }

      .student-card{
        min-height:390px;
      }
    }

    @media (max-width:390px){
      .app{
        padding-left:9px;
        padding-right:9px;
      }

      .student-card{
        min-height:305px;
        border-radius:25px;
      }

      .student-name{
        font-size:clamp(2.15rem,10.8vw,3.8rem);
      }

      .main-btn{
        min-height:56px;
        font-size:.98rem;
      }

      .panel{
        padding:13px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">Y</div>
        <h1>Söz Hakkı</h1>
      </div>

      <div class="d-flex align-items-center gap-2">
        <span class="sync-pill" id="syncText">...</span>
        <button class="icon-btn" type="button" data-bs-toggle="modal" data-bs-target="#settingsModal" aria-label="Ayarlar">⚙️</button>
      </div>
    </div>

    <section id="screenClass" class="screen active">
      <div class="panel">
        <div class="title-row">
          <h2 class="step-title">Sınıf</h2>
        </div>

        <div id="loadingBox" class="loading">
          <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
          <span>Yükleniyor</span>
        </div>

        <div id="classGrid" class="class-grid d-none"></div>

        <div id="loadError" class="alert alert-danger mt-3 d-none fw-bold"></div>
      </div>
    </section>

    <section id="screenSort" class="screen">
      <div class="panel">
        <div class="title-row">
          <h2 class="step-title" id="selectedClassText">Sıralama</h2>
          <button class="icon-btn" type="button" id="backToClassBtn">←</button>
        </div>

        <div class="sort-list">
          <button class="sort-btn" type="button" data-mode="random">
            <span class="sort-num">1</span>
            <strong>Rastgele</strong>
          </button>

          <button class="sort-btn" type="button" data-mode="nameAsc">
            <span class="sort-num">2</span>
            <strong>Ada göre A-Z</strong>
          </button>

          <button class="sort-btn" type="button" data-mode="nameDesc">
            <span class="sort-num">3</span>
            <strong>Ada göre Z-A</strong>
          </button>

          <button class="sort-btn" type="button" data-mode="noAsc">
            <span class="sort-num">4</span>
            <strong>Numaraya göre çoğalan</strong>
          </button>

          <button class="sort-btn" type="button" data-mode="noDesc">
            <span class="sort-num">5</span>
            <strong>Numaraya göre azalan</strong>
          </button>

          <button class="sort-btn" type="button" data-mode="scoreAsc">
            <span class="sort-num">6</span>
            <strong>Puanlaması düşükten yükseğe</strong>
          </button>
        </div>
      </div>
    </section>

    <section id="screenRun" class="screen">
      <div class="run-panel">
        <div class="status-row">
          <div class="stat">
            <b id="runClass">-</b>
            <span>Sınıf</span>
          </div>
          <div class="stat">
            <b id="runRound">1</b>
            <span>Tur</span>
          </div>
          <div class="stat">
            <b id="runLeft">0</b>
            <span>Kalan</span>
          </div>
        </div>

        <div class="student-card" id="studentCard" role="button" tabindex="0">
          <div class="student-no" id="studentNo">NO</div>
          <div class="student-name" id="studentName">Hazır</div>
          <div class="student-meta" id="studentMeta"></div>
        </div>

        <div class="action-row">
          <button class="main-btn btn-finish" type="button" id="finishBtn">Bitir</button>
          <button class="main-btn btn-absent" type="button" id="absentBtn">Gelmedi</button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal fade" id="sessionModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Oturum Listesi</h5>
          <button type="button" class="btn btn-outline-primary btn-sm btn-ui" id="sessionSortBtn">Düşük → Yüksek</button>
        </div>

        <div class="modal-body">
          <div class="table-responsive">
            <table class="table table-sm score-table align-middle">
              <thead>
                <tr>
                  <th>No</th>
                  <th class="table-name">Öğrenci</th>
                  <th class="text-center">Puan</th>
                  <th class="text-center">Durum</th>
                </tr>
              </thead>
              <tbody id="sessionBody"></tbody>
            </table>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-primary btn-ui px-4" id="returnClassBtn" data-bs-dismiss="modal">
            Sınıf
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Ayarlar</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
        </div>

        <div class="modal-body">
          <div class="d-grid gap-2">
            <button class="settings-btn" type="button" id="reloadBtn">🔄 Yenile</button>
            <button class="settings-btn" type="button" id="openScoreListBtn">📊 Sınıf puan listesi</button>
            <button class="settings-btn danger-zone" type="button" id="resetScoresBtn">🧹 Puanlamaları sıfırla</button>
            <button class="settings-btn danger-zone" type="button" id="deleteDbBtn">🗑️ sayacyolu sil</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="scoreListModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Sınıf Puanları</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
        </div>

        <div class="modal-body">
          <div class="d-flex gap-2 mb-2">
            <select id="scoreClassSelect" class="form-select rounded-4 fw-bold"></select>
            <button type="button" class="btn btn-outline-primary btn-ui flex-shrink-0" id="scoreSortBtn">Düşük → Yüksek</button>
          </div>

          <div class="warning-strip" id="scoreWarningStrip"></div>

          <div class="table-responsive">
            <table class="table table-sm score-table align-middle">
              <thead>
                <tr>
                  <th>No</th>
                  <th class="table-name">Öğrenci</th>
                  <th class="text-center">Toplam</th>
                  <th class="text-center">Uyarı</th>
                </tr>
              </thead>
              <tbody id="scoreListBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmTitle">Onay</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
        </div>

        <div class="modal-body">
          <div class="confirm-box fw-bold" id="confirmText"></div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-light btn-ui" data-bs-dismiss="modal">İptal</button>
          <button type="button" class="btn btn-danger btn-ui" id="confirmOkBtn">Onayla</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="deletePathModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">sayacyolu sil</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
        </div>

        <div class="modal-body">
          <div class="confirm-box mb-3">
            <span class="confirm-word">EVET</span>
          </div>
          <input id="deleteConfirmInput" class="form-control form-control-lg rounded-4 fw-bold text-center" autocomplete="off" placeholder="EVET">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-light btn-ui" data-bs-dismiss="modal">İptal</button>
          <button type="button" class="btn btn-danger btn-ui" id="deleteConfirmBtn" disabled>Sil</button>
        </div>
      </div>

  </div>

  <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3">
    <div id="appToast" class="toast border-0 bg-transparent shadow-none" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="alert-pro info" id="toastBox">
        <div class="alert-pro-icon" id="toastIcon">i</div>
        <div>
          <p class="alert-pro-title" id="toastTitle">Bilgi</p>
          <p class="alert-pro-text" id="toastText"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getDatabase, ref, get, update, remove } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";
    import { getAnalytics, isSupported } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAIzu6aNQstwQCdMWODyIwiaVVBm63OeGw",
      authDomain: "odevfeno.firebaseapp.com",
      databaseURL: "https://odevfeno-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "odevfeno",
      storageBucket: "odevfeno.firebasestorage.app",
      messagingSenderId: "662757516934",
      appId: "1:662757516934:web:0042188832f63deb6fd307",
      measurementId: "G-4Q99NQRB38"
    };

    const SHEET_ID = "1OeDI5rQvWXP6s5OhgRFrh1dThnBMmA9mrCjgYuk1Qtw";
    const SHEET_NAME = "Ogrenciler";
    const DB_ROOT = "sayacyolu";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    isSupported().then(ok => {
      if (ok) getAnalytics(app);
    }).catch(() => {});

    const collator = new Intl.Collator("tr", { sensitivity:"base", numeric:true });
    const todayKey = getTodayKey();

    const el = {
      syncText: document.getElementById("syncText"),
      loadingBox: document.getElementById("loadingBox"),
      classGrid: document.getElementById("classGrid"),
      loadError: document.getElementById("loadError"),

      screenClass: document.getElementById("screenClass"),
      screenSort: document.getElementById("screenSort"),
      screenRun: document.getElementById("screenRun"),

      selectedClassText: document.getElementById("selectedClassText"),
      backToClassBtn: document.getElementById("backToClassBtn"),

      runClass: document.getElementById("runClass"),
      runRound: document.getElementById("runRound"),
      runLeft: document.getElementById("runLeft"),

      studentCard: document.getElementById("studentCard"),
      studentNo: document.getElementById("studentNo"),
      studentName: document.getElementById("studentName"),
      studentMeta: document.getElementById("studentMeta"),

      finishBtn: document.getElementById("finishBtn"),
      absentBtn: document.getElementById("absentBtn"),

      sessionBody: document.getElementById("sessionBody"),
      sessionSortBtn: document.getElementById("sessionSortBtn"),
      returnClassBtn: document.getElementById("returnClassBtn"),

      reloadBtn: document.getElementById("reloadBtn"),
      openScoreListBtn: document.getElementById("openScoreListBtn"),
      resetScoresBtn: document.getElementById("resetScoresBtn"),
      deleteDbBtn: document.getElementById("deleteDbBtn"),

      scoreClassSelect: document.getElementById("scoreClassSelect"),
      scoreSortBtn: document.getElementById("scoreSortBtn"),
      scoreWarningStrip: document.getElementById("scoreWarningStrip"),
      scoreListBody: document.getElementById("scoreListBody"),

      confirmTitle: document.getElementById("confirmTitle"),
      confirmText: document.getElementById("confirmText"),
      confirmOkBtn: document.getElementById("confirmOkBtn"),

      deleteConfirmInput: document.getElementById("deleteConfirmInput"),
      deleteConfirmBtn: document.getElementById("deleteConfirmBtn"),

      toast: document.getElementById("appToast"),
      toastBox: document.getElementById("toastBox"),
      toastIcon: document.getElementById("toastIcon"),
      toastTitle: document.getElementById("toastTitle"),
      toastText: document.getElementById("toastText")
    };

    const sessionModal = new bootstrap.Modal(document.getElementById("sessionModal"));
    const settingsModal = bootstrap.Modal.getOrCreateInstance(document.getElementById("settingsModal"));
    const scoreListModal = new bootstrap.Modal(document.getElementById("scoreListModal"));
    const confirmModal = new bootstrap.Modal(document.getElementById("confirmModal"));
    const deletePathModal = new bootstrap.Modal(document.getElementById("deletePathModal"));
    const toast = new bootstrap.Toast(el.toast, { delay:1900 });

    let students = [];
    let classNames = [];
    let dbData = { c:{}, g:{} };
    let pendingUpdates = {};

    let selectedClass = "";
    let selectedClassKey = "";
    let selectedMode = "";

    let queue = [];
    let currentStudent = null;
    let round = 1;
    let busy = false;
    let saveTimer = null;

    let sessionSortAsc = true;
    let scoreSortAsc = true;
    let activeScoreClass = "";
    let confirmAction = null;

    let sessionData = createSessionData();

    init();

    async function init(){
      bindEvents();
      await reloadAll();
    }

    function bindEvents(){
      el.backToClassBtn.addEventListener("click", () => showScreen("class"));

      document.querySelectorAll(".sort-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedMode = btn.dataset.mode;
          startRun();
        });
      });

      el.studentCard.addEventListener("click", givePointAndNext);
      el.studentCard.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          givePointAndNext();
        }
      });

      el.absentBtn.addEventListener("click", markAbsentAndNext);
      el.finishBtn.addEventListener("click", finishRun);

      el.returnClassBtn.addEventListener("click", () => {
        endRun();
        showScreen("class");
      });

      el.sessionSortBtn.addEventListener("click", () => {
        sessionSortAsc = !sessionSortAsc;
        renderSessionModal();
      });

      el.reloadBtn.addEventListener("click", async () => {
        settingsModal.hide();
        await reloadAll();
        showAlert("success", "Yenilendi", "Kayıtlar güncel.");
      });

      el.openScoreListBtn.addEventListener("click", openScoreList);
      el.scoreClassSelect.addEventListener("change", () => {
        activeScoreClass = el.scoreClassSelect.value;
        renderScoreList();
      });

      el.scoreSortBtn.addEventListener("click", () => {
        scoreSortAsc = !scoreSortAsc;
        renderScoreList();
      });

      el.resetScoresBtn.addEventListener("click", () => {
        openConfirm("Puanlamaları sıfırla", "Tüm sınıf puanlamaları sıfırlanacak.", resetScores);
      });

      el.deleteDbBtn.addEventListener("click", () => {
        settingsModal.hide();
        el.deleteConfirmInput.value = "";
        el.deleteConfirmBtn.disabled = true;
        deletePathModal.show();
        setTimeout(() => el.deleteConfirmInput.focus(), 260);
      });

      el.confirmOkBtn.addEventListener("click", async () => {
        if (typeof confirmAction !== "function") return;
        const fn = confirmAction;
        confirmAction = null;
        confirmModal.hide();
        await fn();
      });

      el.deleteConfirmInput.addEventListener("input", () => {
        el.deleteConfirmBtn.disabled = el.deleteConfirmInput.value.trim() !== "EVET";
      });

      el.deleteConfirmBtn.addEventListener("click", deleteDatabasePath);
    }

    async function reloadAll(){
      try{
        setLoading(true);
        el.loadError.classList.add("d-none");
        el.syncText.textContent = "...";

        students = await loadStudentsFromSheet();

        if (!students.length) {
          throw new Error("Öğrenci listesi boş.");
        }

        await loadFirebaseData();

        renderClassButtons();
        setLoading(false);
        el.syncText.textContent = "Hazır";
      }catch(err){
        setLoading(false);
        el.loadError.classList.remove("d-none");
        el.loadError.textContent = err.message || "Yükleme hatası.";
        el.syncText.textContent = "Hata";
        showAlert("danger", "Hata", el.loadError.textContent);
      }
    }

    function setLoading(isLoading){
      el.loadingBox.classList.toggle("d-none", !isLoading);
      el.classGrid.classList.toggle("d-none", isLoading);
    }

    function showScreen(name){
      el.screenClass.classList.toggle("active", name === "class");
      el.screenSort.classList.toggle("active", name === "sort");
      el.screenRun.classList.toggle("active", name === "run");
    }

    function renderClassButtons(){
      classNames = [...new Set(students.map(s => s.sinif))]
        .filter(Boolean)
        .sort((a,b) => collator.compare(a,b));

      el.classGrid.innerHTML = "";

      classNames.forEach(cls => {
        const count = students.filter(s => s.sinif === cls).length;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "choice-card";
        btn.innerHTML = `<strong>${escapeHTML(cls)}</strong><span>${count}</span>`;
        btn.addEventListener("click", () => {
          selectedClass = cls;
          selectedClassKey = pathKey(cls);
          el.selectedClassText.textContent = cls;
          showScreen("sort");
        });
        el.classGrid.appendChild(btn);
      });
    }

    function startRun(){
      sessionData = createSessionData();
      sessionSortAsc = true;
      round = 1;
      buildQueue(true);
      showScreen("run");
      showNextStudent();
    }

    function endRun(){
      selectedClass = "";
      selectedClassKey = "";
      selectedMode = "";
      queue = [];
      currentStudent = null;
      round = 1;
      busy = false;
      sessionData = createSessionData();
    }

    function buildQueue(firstStart = false){
      let list = getClassStudents()
        .filter(s => getAbsentCount(s) < 2);

      if (selectedMode === "random") {
        list = shuffle(list);
      }

      if (selectedMode === "nameAsc") {
        list.sort((a,b) => collator.compare(a.name, b.name));
      }

      if (selectedMode === "nameDesc") {
        list.sort((a,b) => collator.compare(b.name, a.name));
      }

      if (selectedMode === "noAsc") {
        list.sort((a,b) => numberCompare(a.no, b.no));
      }

      if (selectedMode === "noDesc") {
        list.sort((a,b) => numberCompare(b.no, a.no));
      }

      if (selectedMode === "scoreAsc") {
        list.sort((a,b) => {
          const scoreDiff = getScore(a) - getScore(b);
          if (scoreDiff !== 0) return scoreDiff;
          return collator.compare(a.name, b.name);
        });
      }

      queue = list;

      if (!firstStart) {
        round++;
        showAlert("info", "Tur", `${round}. tur`);
      }
    }

    function showNextStudent(){
      if (busy) return;

      if (!queue.length) {
        buildQueue(false);
      }

      if (!queue.length) {
        currentStudent = null;
        updateRunHeader();
        el.studentNo.textContent = "-";
        el.studentName.textContent = "Bitti";
        el.studentMeta.innerHTML = "";
        return;
      }

      currentStudent = queue.shift();
      renderCurrentStudent();
    }

    function renderCurrentStudent(){
      updateRunHeader();

      if (!currentStudent) return;

      const score = getScore(currentStudent);
      const absent = getAbsentCount(currentStudent);

      el.studentNo.textContent = `NO ${currentStudent.no}`;
      el.studentName.textContent = currentStudent.name;

      const badges = [
        `<span class="meta-badge primary">Puan ${score}</span>`
      ];

      if (absent === 1) {
        badges.push(`<span class="meta-badge warn">Gelmedi</span>`);
      }

      el.studentMeta.innerHTML = badges.join("");
    }

    function updateRunHeader(){
      el.runClass.textContent = selectedClass || "-";
      el.runRound.textContent = String(round);
      el.runLeft.textContent = String(queue.length + (currentStudent ? 1 : 0));
    }

    async function givePointAndNext(){
      if (busy || !currentStudent) return;

      busy = true;

      const st = currentStudent;
      addSessionStudent(st);
      sessionData.given[pathKey(st.no)] = (sessionData.given[pathKey(st.no)] || 0) + 1;

      const newScore = getScore(st) + 1;
      setLocalScore(st, newScore);
      scheduleSave();

      busy = false;
      showNextStudent();
    }

    async function markAbsentAndNext(){
      if (busy || !currentStudent) return;

      busy = true;

      const st = currentStudent;
      const sKey = pathKey(st.no);

      addSessionStudent(st);
      sessionData.absent[sKey] = (sessionData.absent[sKey] || 0) + 1;

      const newAbsent = getAbsentCount(st) + 1;
      setLocalAbsent(st, newAbsent);
      scheduleSave();

      if (newAbsent < 2) {
        queue.push(st);
        showAlert("warning", "Gelmedi", st.name);
      } else {
        queue = queue.filter(x => pathKey(x.no) !== sKey);
        showAlert("danger", "Gelmedi", st.name);
      }

      busy = false;
      showNextStudent();
    }

    async function finishRun(){
      if (busy) return;

      busy = true;
      el.finishBtn.disabled = true;
      el.finishBtn.textContent = "Kaydediliyor";

      try{
        await flushSave();
        sessionSortAsc = true;
        renderSessionModal();
        sessionModal.show();
      }catch(err){
        showAlert("danger", "Hata", "Kayıt alınamadı.");
      }finally{
        el.finishBtn.disabled = false;
        el.finishBtn.textContent = "Bitir";
        busy = false;
      }
    }

    function createSessionData(){
      return {
        order:[],
        students:{},
        given:{},
        absent:{}
      };
    }

    function addSessionStudent(st){
      const sKey = pathKey(st.no);

      if (!sessionData.students[sKey]) {
        sessionData.students[sKey] = {
          no:st.no,
          name:st.name,
          sinif:st.sinif
        };
        sessionData.order.push(sKey);
      }
    }

    function getSessionRows(){
      return sessionData.order.map(sKey => {
        const st = sessionData.students[sKey];
        const given = Number(sessionData.given[sKey] || 0);
        const absent = Number(sessionData.absent[sKey] || 0);
        const todayAbsent = getAbsentCount(st);
        const lockedAbsent = todayAbsent >= 2;

        return {
          key:sKey,
          no:st.no,
          name:st.name,
          given,
          absent,
          lockedAbsent,
          sortScore:given
        };
      });
    }

    function renderSessionModal(){
      const rows = getSessionRows().sort((a,b) => {
        const diff = sessionSortAsc ? a.sortScore - b.sortScore : b.sortScore - a.sortScore;
        if (diff !== 0) return diff;
        return collator.compare(a.name, b.name);
      });

      el.sessionSortBtn.textContent = sessionSortAsc ? "Düşük → Yüksek" : "Yüksek → Düşük";

      if (!rows.length) {
        el.sessionBody.innerHTML = `<tr><td colspan="4" class="text-center text-secondary py-4">Kayıt yok</td></tr>`;
        return;
      }

      el.sessionBody.innerHTML = rows.map(r => {
        const scoreCell = r.lockedAbsent
          ? `<span class="text-secondary fw-bold">—</span>`
          : `<span class="badge rounded-pill badge-score">${r.given}</span>`;

        const statusCell = r.lockedAbsent
          ? `<span class="badge rounded-pill badge-red">Gelmedi</span>`
          : r.absent > 0
            ? `<span class="badge rounded-pill badge-orange">Atlandı</span>`
            : `<span class="text-secondary">—</span>`;

        return `
          <tr>
            <td>${escapeHTML(r.no)}</td>
            <td>${escapeHTML(r.name)}</td>
            <td class="text-center">${scoreCell}</td>
            <td class="text-center">${statusCell}</td>
          </tr>
        `;
      }).join("");
    }

    function openScoreList(){
      settingsModal.hide();

      activeScoreClass = selectedClass || activeScoreClass || classNames[0] || "";
      scoreSortAsc = true;

      el.scoreClassSelect.innerHTML = classNames.map(cls => {
        return `<option value="${escapeHTML(cls)}" ${cls === activeScoreClass ? "selected" : ""}>${escapeHTML(cls)}</option>`;
      }).join("");

      renderScoreList();
      scoreListModal.show();
    }

    function renderScoreList(){
      if (!activeScoreClass) {
        el.scoreListBody.innerHTML = "";
        return;
      }

      const rows = students
        .filter(s => s.sinif === activeScoreClass)
        .map(s => ({
          no:s.no,
          name:s.name,
          score:getScore(s)
        }));

      const scores = rows.map(r => r.score);
      const min = scores.length ? Math.min(...scores) : 0;
      const max = scores.length ? Math.max(...scores) : 0;

      rows.sort((a,b) => {
        const diff = scoreSortAsc ? a.score - b.score : b.score - a.score;
        if (diff !== 0) return diff;
        return collator.compare(a.name, b.name);
      });

      el.scoreSortBtn.textContent = scoreSortAsc ? "Düşük → Yüksek" : "Yüksek → Düşük";

      const warningCount = rows.filter(r => getLowScoreLabel(r.score, min, max)).length;

      el.scoreWarningStrip.classList.toggle("show", warningCount > 0);
      el.scoreWarningStrip.textContent = warningCount > 0 ? `Az söz hakkı: ${warningCount}` : "";

      el.scoreListBody.innerHTML = rows.map(r => {
        const warn = getLowScoreLabel(r.score, min, max);
        const warnCell = warn
          ? `<span class="badge rounded-pill ${warn === "Çok az" ? "badge-red" : "badge-orange"}">${warn}</span>`
          : `<span class="text-secondary">—</span>`;

        return `
          <tr>
            <td>${escapeHTML(r.no)}</td>
            <td>${escapeHTML(r.name)}</td>
            <td class="text-center"><span class="badge rounded-pill badge-score">${r.score}</span></td>
            <td class="text-center">${warnCell}</td>
          </tr>
        `;
      }).join("");
    }

    function getLowScoreLabel(score, min, max){
      if (max <= min) return "";
      if (score === min) return "Çok az";
      if ((max - min) >= 3 && score <= min + 1) return "Az";
      return "";
    }

    function openConfirm(title, text, action){
      confirmAction = action;
      el.confirmTitle.textContent = title;
      el.confirmText.textContent = text;
      settingsModal.hide();
      confirmModal.show();
    }

    async function resetScores(){
      try{
        await remove(ref(db, `${DB_ROOT}/c`));
        dbData.c = {};
        pendingUpdates = {};
        renderCurrentStudent();
        showAlert("success", "Sıfırlandı", "Puanlamalar temizlendi.");
      }catch(err){
        showAlert("danger", "Hata", "Sıfırlanamadı.");
      }
    }

    async function deleteDatabasePath(){
      if (el.deleteConfirmInput.value.trim() !== "EVET") return;

      try{
        await remove(ref(db, DB_ROOT));
        dbData = { c:{}, g:{} };
        pendingUpdates = {};
        queue = [];
        currentStudent = null;
        sessionData = createSessionData();
        deletePathModal.hide();
        showScreen("class");
        showAlert("success", "Silindi", "sayacyolu temizlendi.");
      }catch(err){
        showAlert("danger", "Hata", "Silinemedi.");
      }
    }

    async function loadFirebaseData(){
      const snap = await get(ref(db, DB_ROOT));

      if (snap.exists()) {
        const val = snap.val() || {};
        dbData = {
          c: val.c || {},
          g: val.g || {}
        };
      } else {
        dbData = { c:{}, g:{} };
      }
    }

    function scheduleSave(){
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        flushSave().catch(() => {});
      }, 240);
    }

    async function flushSave(){
      clearTimeout(saveTimer);

      const updates = { ...pendingUpdates };
      updates["m/ls"] = Date.now();

      if (!Object.keys(pendingUpdates).length) {
        return;
      }

      await update(ref(db, DB_ROOT), updates);

      Object.keys(updates).forEach(path => {
        if (path !== "m/ls" && pendingUpdates[path] === updates[path]) {
          delete pendingUpdates[path];
        }
      });

      el.syncText.textContent = "Güncel";
    }

    function getClassStudents(){
      return students.filter(s => s.sinif === selectedClass);
    }

    function getScore(st){
      const cKey = pathKey(st.sinif);
      const sKey = pathKey(st.no);
      return Number(dbData.c?.[cKey]?.[sKey] || 0);
    }

    function setLocalScore(st, value){
      const cKey = pathKey(st.sinif);
      const sKey = pathKey(st.no);
      const score = Number(value) || 0;

      dbData.c ||= {};
      dbData.c[cKey] ||= {};
      dbData.c[cKey][sKey] = score;

      pendingUpdates[`c/${cKey}/${sKey}`] = score;
    }

    function getAbsentCount(st){
      const cKey = pathKey(st.sinif);
      const sKey = pathKey(st.no);
      return Number(dbData.g?.[todayKey]?.[cKey]?.[sKey] || 0);
    }

    function setLocalAbsent(st, value){
      const cKey = pathKey(st.sinif);
      const sKey = pathKey(st.no);
      const absent = Math.min(2, Number(value) || 0);

      dbData.g ||= {};
      dbData.g[todayKey] ||= {};
      dbData.g[todayKey][cKey] ||= {};
      dbData.g[todayKey][cKey][sKey] = absent;

      pendingUpdates[`g/${todayKey}/${cKey}/${sKey}`] = absent;
    }

    async function loadStudentsFromSheet(){
      const data = await loadGvizJsonp(SHEET_ID, SHEET_NAME);
      const table = data?.table;

      if (!table || !Array.isArray(table.cols) || !Array.isArray(table.rows)) {
        throw new Error("Google Sheets okunamadı.");
      }

      const headers = table.cols.map(c => clean(c.label || c.id || ""));

      const rows = table.rows.map(row => {
        const obj = {};
        row.c.forEach((cell, index) => {
          const header = headers[index] || `COL${index + 1}`;
          obj[header] = cellValue(cell);
        });
        return obj;
      });

      return normalizeStudents(rows);
    }

    function loadGvizJsonp(sheetId, sheetName){
      return new Promise((resolve, reject) => {
        const cb = `gviz_cb_${Date.now()}_${Math.floor(Math.random() * 99999)}`;
        const script = document.createElement("script");

        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheets zaman aşımı."));
        }, 12000);

        function cleanup(){
          clearTimeout(timer);
          delete window[cb];
          script.remove();
        }

        window[cb] = response => {
          cleanup();

          if (response?.status === "error") {
            reject(new Error("Google Sheets erişim hatası."));
            return;
          }

          resolve(response);
        };

        const tqx = encodeURIComponent(`out:json;responseHandler:${cb}`);
        script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&tqx=${tqx}`;
        script.onerror = () => {
          cleanup();
          reject(new Error("Google Sheets bağlantı hatası."));
        };

        document.head.appendChild(script);
      });
    }

    function normalizeStudents(rows){
      const list = [];

      rows.forEach(row => {
        const keys = Object.keys(row);
        const noKey = findKey(keys, ["no", "numara", "ogrencino", "ogrencinumara"]);
        const nameKey = findKey(keys, ["adsoyad", "adsoyadi", "adi", "ad"]);
        const classKey = findKey(keys, ["sinif", "sube", "grup"]);

        let no = clean(noKey ? row[noKey] : row[keys[0]]);
        let name = clean(nameKey ? row[nameKey] : row[keys[1]]);
        let sinif = clean(classKey ? row[classKey] : row[keys[2]]);

        no = normalizeNo(no);
        name = normalizeName(name);
        sinif = normalizeClass(sinif);

        if (!no || !name || !sinif) return;
        if (normalizeTR(no) === "no") return;
        if (normalizeTR(name).includes("adsoyad")) return;
        if (normalizeTR(sinif).includes("sinif")) return;

        list.push({ no, name, sinif });
      });

      const unique = new Map();

      list.forEach(st => {
        const key = `${st.sinif}__${st.no}`;
        if (!unique.has(key)) unique.set(key, st);
      });

      return [...unique.values()].sort((a,b) => {
        const c = collator.compare(a.sinif, b.sinif);
        if (c !== 0) return c;
        return numberCompare(a.no, b.no);
      });
    }

    function findKey(keys, options){
      return keys.find(key => {
        const n = normalizeTR(key);
        return options.some(opt => n === opt || n.includes(opt));
      });
    }

    function cellValue(cell){
      if (!cell) return "";
      if (cell.f !== undefined && cell.f !== null) return String(cell.f);
      if (cell.v !== undefined && cell.v !== null) return String(cell.v);
      return "";
    }

    function clean(value){
      return String(value ?? "")
        .replace(/\u00A0/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeNo(value){
      return clean(value).replace(/\.0$/, "");
    }

    function normalizeName(value){
      return clean(value).toLocaleUpperCase("tr-TR");
    }

    function normalizeClass(value){
      return clean(value).toLocaleUpperCase("tr-TR");
    }

    function normalizeTR(value){
      return String(value ?? "")
        .replace(/İ/g, "I")
        .replace(/ı/g, "i")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function pathKey(value){
      return encodeURIComponent(String(value ?? "").trim())
        .replace(/\./g, "%2E")
        .replace(/#/g, "%23")
        .replace(/\$/g, "%24")
        .replace(/\[/g, "%5B")
        .replace(/\]/g, "%5D")
        .replace(/\//g, "%2F");
    }

    function numberCompare(a,b){
      const na = Number(String(a).replace(/[^\d.-]/g, ""));
      const nb = Number(String(b).replace(/[^\d.-]/g, ""));

      if (Number.isFinite(na) && Number.isFinite(nb)) return na - nb;
      return collator.compare(String(a), String(b));
    }

    function shuffle(array){
      const arr = [...array];

      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }

      return arr;
    }

    function getTodayKey(){
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function escapeHTML(value){
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function showAlert(type, title, text){
      const iconMap = {
        success:"✓",
        danger:"!",
        warning:"!",
        info:"i"
      };

      el.toastBox.className = `alert-pro ${type}`;
      el.toastIcon.textContent = iconMap[type] || "i";
      el.toastTitle.textContent = title;
      el.toastText.textContent = text;
      toast.show();
    }
  </script>
</body>
